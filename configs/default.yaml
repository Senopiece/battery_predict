experiment_name: battery_forecast
seed: null
data:
  dataset_dir: data/set
  split_seed: 7
  val_fraction: 0.2
  cycle_window: 64
  pred_seq_len: 64
  min_observed_cycles: 2
  train_batch_size: 16
  val_batch_size: 16
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  utilize_epoch_windows: 512
  utilize_val_epoch_windows: 256
  dt_seconds: 1.0
  min_discharge_capacity_ah: 1.0e-6
  drop_cycles_without_discharge: true
encoder:
  d_model: 32
  latent_dim: 64 # ~ d_model * pooling_heads
  conv_channels: [16, 32]
  conv_kernels: [5, 3]
  conv_strides: [1, 2]
  conv_group_norm_groups: 4
  transformer_layers: 1
  attention_heads: 4
  ff_dim: 64
  dropout: 0.1
  pooling_heads: 2
  max_signal_positions: 2048
aggregator:
  layers: 1
  attention_heads: 4
  ff_dim: 64
  dropout: 0.1
  pooling_heads: 2
head:
  hidden_dim: 64
optimizer:
  lr: 5.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.95]
scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 1.0e-5
trainer:
  max_epochs: 30
  accelerator: auto
  devices: auto
  precision: 16-mixed
  gradient_clip_val: 1.0
  log_every_n_steps: 10
  deterministic: false
  accumulate_grad_batches: 1
  default_root_dir: outputs
callbacks:
  checkpoint_monitor: val/loss
  checkpoint_mode: min
  checkpoint_filename: best-{epoch:02d}-{val_loss:.4f}
  save_top_k: 1
clearml:
  enabled: true
  project_name: battery-predict
  task_name: battery_forecast
  tags: [battery, lightning, transformer]
  output_uri: null
  offline_mode: false